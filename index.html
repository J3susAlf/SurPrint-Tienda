<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>SURPRINT TIENDA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- NAV -->
    <nav class="navbar navbar-dark px-4 py-3 surprint-nav">
      <span class="navbar-brand fw-bold d-flex align-items-center mb-0">
        <img
          src="assets/surprintLogo.png"
          alt="Surprint Logo"
          class="navbar-logo me-2"
        />
        SURPRINT
      </span>
    </nav>

    <!-- HERO -->
    <section class="hero-section">
      <div class="container hero-content">
        <div class="row align-items-center">
          <div class="col-lg-7">
            <h1>Productos personalizados,<br />hechos para ti.</h1>
            <p class="hero-sub">
              Playeras, llaveros, calcomanías, figuras 3D y más.<br />Diseña lo
              que imaginas, nosotros lo hacemos realidad.
            </p>
          </div>
          <div class="col-lg-5 text-lg-end mt-4 mt-lg-0">
            <p class="hero-cta-label">¿Tienes algo en mente?</p>
            <a href="https://wa.me/" target="_blank" class="btn btn-hero"
              >Contáctanos por WhatsApp ➜</a
            >
            <div class="hero-socials mt-4">
              <p class="hero-socials-label">Síguenos en redes sociales</p>
              <a
                href="https://www.facebook.com/share/18rsDmfM3a/"
                target="_blank"
                rel="noopener noreferrer"
                class="hero-social-link"
                ><i class="bi bi-facebook"></i> Facebook</a
              >
              <a
                href="https://www.instagram.com/surprint_oficial?igsh=MWw2cmd5OWNpZXU3eA=="
                target="_blank"
                rel="noopener noreferrer"
                class="hero-social-link"
                ><i class="bi bi-instagram"></i> Instagram</a
              >
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- FILTROS -->
    <div class="container my-4 text-center filtros">
      <button class="btn btn-filtro mx-1" onclick="filtrar('todos')">
        Todos
      </button>
      <button class="btn btn-filtro mx-1" onclick="filtrar('playera')">
        Playeras
      </button>
      <button class="btn btn-filtro mx-1" onclick="filtrar('llavero')">
        Llaveros
      </button>
      <button class="btn btn-filtro mx-1" onclick="filtrar('calcomania')">
        Calcomanías
      </button>
      <button class="btn btn-filtro mx-1" onclick="filtrar('figura')">
        Figuras 3D
      </button>
      <button class="btn btn-filtro mx-1" onclick="filtrar('gorra')">
        Gorras
      </button>
    </div>

    <!-- PRODUCTOS -->
    <div class="container">
      <div id="productos" class="row g-4"></div>
    </div>

    <!-- CONTACTO -->
    <footer class="text-center text-white py-4 mt-5">
      <p>Contáctanos</p>
      <a href="#" class="btn btn-success">WhatsApp</a>
    </footer>

    <!-- Bootstrap JS (necesario para el carrusel) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
